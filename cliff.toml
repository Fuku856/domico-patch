# git-cliff 設定 — パッチ自身の CHANGELOG を Conventional Commits から生成する。
# バージョン番号の決定は scripts/version.py が単一の真実の源(SSOT)。git-cliff は
# その番号(タグ patch-vX.Y.Z)を渡されて CHANGELOG 本文を整形するだけに使う。
# タグ体系は `patch-v*`(ベース追従の `v{vn}-patch` 等とは別軸)。

[changelog]
header = """
# Changelog

このパッチ(domico-patch)自身のリリースノート。Conventional Commits から自動生成。
ベースアプリ追従ビルド(`v{versionName}-patch`)とは別軸のバージョンです。
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="patch-v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# タグ patch-vX.Y.Z のみをリリース境界として扱う(ベース追従タグは無視)。
tag_pattern = "patch-v[0-9]*"
# マージコミット等のノイズを除外。
commit_preprocessors = []
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", group = "Documentation" },
    { message = "^ci", group = "CI" },
    { message = "^build", group = "Build" },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^Merge", skip = true },
    { body = ".*", group = "Other" },
]
filter_commits = false
date_order = false
sort_commits = "oldest"
