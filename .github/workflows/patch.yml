name: Patch Domico (auto)

# 公式 Domico の更新を検知し、APK を取得して B案パッチ(起動時ログイン通知の
# タッチ遮断解除)を classes4.dex 差し替えで適用・再署名し、全スプリットを1つに
# まとめた .apks を Release(v{vn}-patch)に添付する。手動実行も可。
#
# あわせて、公式版が更新されるたびに「未加工・公式署名のままの公式 APK」を
# 独立 Release(v{vn}-official)として自動アーカイブする。これはパッチ適合可否に
# 依存せず、既に v{vn}-official があれば作成をスキップする(cron 冪等)。
#
# 重要: パッチは apktool 全体リビルドではなく「classes4.dex のみ差し替え」方式
#       (resources.arsc / AndroidManifest はバイト維持)。apktool で作り直すと
#       一部端末(Xiaomi/HyperOS 等)が INSTALL_FAILED_USER_RESTRICTED で弾くため。
#
# 必要な GitHub Secrets:
#   KEYSTORE_BASE64  : 署名用 keystore を base64 化したもの
#   KEYSTORE_PASSWORD: keystore のパスワード (storepass)
#   KEY_PASSWORD     : 鍵のパスワード (省略時は KEYSTORE_PASSWORD を流用)
#   KEY_ALIAS        : 鍵のエイリアス
#   GOOGLE_EMAIL     : Google アカウントのメール (Play 取得用)
#   GOOGLE_AAS_TOKEN : 上記アカウントの AAS トークン (Play 取得用)
#   (keystore 系は scripts/setup-signing.* でまとめて登録可。
#    AAS トークンの作り方は docs/install.md を参照)
#
# 言語について:
#   Google Play から locale=ja_JP で取得するため config.ja(日本語)を含む。
#   料金は無料(自分のアカウント権利で無料アプリを取得するだけ)。
#   ※ Play の非公式プロトコル利用はアカウント凍結リスクがあるため、
#     メインではなく専用/サブの Google アカウント使用を推奨。
#   ※ 取得できる密度/ABI は apkeep の既定デバイスプロファイル依存。
#     端末に完全一致させたい場合はローカルの scripts/pull-splits.* を使用。

on:
  schedule:
    - cron: "0 0 * * *"   # 毎日 00:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "前回と同じバージョンでも強制的にパッチする"
        type: boolean
        default: false

permissions:
  contents: write

env:
  PACKAGE: jp.co.kyoritsu.domico
  BAKSMALI_URL: "https://github.com/baksmali/smali/releases/download/3.0.9/baksmali-3.0.9-fat-release.jar"
  SMALI_URL: "https://github.com/baksmali/smali/releases/download/3.0.9/smali-3.0.9-fat-release.jar"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (build-tools)
        uses: android-actions/setup-android@v3

      - name: Install build-tools 35.0.0
        run: sdkmanager "build-tools;35.0.0" "platform-tools"

      - name: Cache smali/baksmali
        id: cache-smali
        uses: actions/cache@v4
        with:
          path: |
            tools/baksmali.jar
            tools/smali.jar
          key: smali-3.0.9

      - name: Download smali/baksmali
        if: steps.cache-smali.outputs.cache-hit != 'true'
        run: |
          mkdir -p tools
          curl -L -o tools/baksmali.jar "$BAKSMALI_URL"
          curl -L -o tools/smali.jar "$SMALI_URL"

      - name: Install apkeep (APK downloader)
        run: |
          curl -L -o apkeep "https://github.com/EFForg/apkeep/releases/latest/download/apkeep-x86_64-unknown-linux-gnu"
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/apkeep

      - name: Probe latest version (Play, base APK のみ取得)
        id: check
        run: |
          # 版チェックは base(主APK)だけ取得して読む。split_apk/locale を付けないので
          # config split(言語/ABI/密度)は落とさず ~40MB→~29MB に軽量化できる。
          # base には AndroidManifest があるので versionName/Code を aapt2 で読める。
          rm -rf probe && mkdir -p probe
          apkeep -a "${PACKAGE}" -d google-play \
            -e "${{ secrets.GOOGLE_EMAIL }}" -t "${{ secrets.GOOGLE_AAS_TOKEN }}" \
            --accept-tos probe/
          find probe -mindepth 2 -name '*.apk' -exec mv -t probe/ {} + 2>/dev/null || true
          echo "--- probe downloaded (base のみのはず) ---"; ls -la probe/
          AAPT=$(ls $ANDROID_SDK_ROOT/build-tools/*/aapt2 | head -1)
          BASE=""
          for f in probe/*.apk; do
            if unzip -l "$f" | grep -qE 'classes[0-9]*\.dex'; then BASE="$f"; break; fi
          done
          if [ -z "$BASE" ]; then echo "::error::probe base apk (with dex) not found"; exit 1; fi
          BADGING=$("$AAPT" dump badging "$BASE")
          VN=$(echo "$BADGING" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")
          VC=$(echo "$BADGING" | sed -n "s/.*versionCode='\([0-9]*\)'.*/\1/p")
          echo "vn=$VN" >> "$GITHUB_OUTPUT"
          echo "vc=$VC" >> "$GITHUB_OUTPUT"
          echo "tag=v${VN}-patch" >> "$GITHUB_OUTPUT"
          echo "official_tag=v${VN}-official" >> "$GITHUB_OUTPUT"
          echo "Probed versionName=$VN versionCode=$VC"
          # パッチ版 Release が既にあれば「パッチは更新なし」としてパッチ処理をスキップ。
          if gh release view "v${VN}-patch" >/dev/null 2>&1; then
            echo "v${VN}-patch は公開済み → パッチ処理スキップ"
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "新バージョン v${VN} を検知 → 検査・パッチへ"
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi
          # 公式ミラー Release は独立判定。既にあれば公式ミラー作成だけをスキップする
          # (cron で何度走っても重複作成しない)。
          if gh release view "v${VN}-official" >/dev/null 2>&1; then
            echo "v${VN}-official は公開済み → 公式ミラー作成スキップ"
            echo "new_official=false" >> "$GITHUB_OUTPUT"
          else
            echo "公式 v${VN} を未アーカイブ → 公式ミラー作成へ"
            echo "new_official=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download splits (Google Play, 日本語含む)
        if: steps.check.outputs.new == 'true' || steps.check.outputs.new_official == 'true' || inputs.force
        run: |
          rm -rf download && mkdir -p download
          # ビルド/公式ミラーに必要な全スプリット(base + config 群)を取得する。
          # 公式ミラーはパッチ適合可否に依存しないため、dry-run の前に取得する。
          # locale=ja_JP で日本語スプリット(config.ja)を含める。split_apk=1 で分割取得。
          apkeep -a "${PACKAGE}" -d google-play \
            -e "${{ secrets.GOOGLE_EMAIL }}" -t "${{ secrets.GOOGLE_AAS_TOKEN }}" \
            --accept-tos -o "split_apk=1,locale=ja_JP" \
            download/
          # 入れ子で落ちることがあるので全 .apk を download/ 直下へ集約
          find download -mindepth 2 -name '*.apk' -exec mv -t download/ {} + 2>/dev/null || true
          echo "--- downloaded ---"
          ls -la download/
          # probe と splits で取得バージョンが一致するか確認(ロールアウト競合の検知)
          AAPT=$(ls $ANDROID_SDK_ROOT/build-tools/*/aapt2 | head -1)
          for f in download/*.apk; do
            if unzip -l "$f" | grep -qE 'classes[0-9]*\.dex'; then
              VN_DL=$("$AAPT" dump badging "$f" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")
              if [ "$VN_DL" != "${{ steps.check.outputs.vn }}" ]; then
                echo "::warning::Play バージョン不一致: probe=${{ steps.check.outputs.vn }}, splits=$VN_DL — タグと artifact のバージョンが食い違う可能性があります。"
              fi
              break
            fi
          done

      - name: Bundle official APKs (unmodified, official signature)
        if: steps.check.outputs.new_official == 'true' || inputs.force
        run: |
          # 公式スプリットを未加工(公式署名のまま)で 1 つの .apks に同梱する。
          # 再署名/zipalign/パッチは一切しない。出力先は build.py が掃除する work/out とは分離。
          # 旧版の残骸が混ざらないよう出力先は毎回作り直す。
          rm -rf work/official && mkdir -p work/official
          python3 scripts/bundle_official.py \
            --input download \
            --out work/official/domico-${{ steps.check.outputs.vn }}-official.apks \
            --app-version "${{ steps.check.outputs.vn }}"

      - name: Publish official mirror Release
        if: steps.check.outputs.new_official == 'true' || inputs.force
        run: |
          # 公式ミラーはパッチ処理より先に公開する(パッチが壊れた版でも公式は残す)。
          # force 再実行に備え、既存 Release があれば削除してから作り直す(タグは残る)。
          # 本文は base version の 1 行のみ。--generate-notes は付けない
          # (このリポジトリの PR/コミット履歴は公式ミラーと無関係なため)。
          # --latest=false: パッチ破損版で公式ミラーが唯一の新規 Release になっても
          #   「Latest」表示にせず、未パッチ版をユーザーが誤って掴むのを防ぐ。
          gh release delete "${{ steps.check.outputs.official_tag }}" --yes 2>/dev/null || true
          gh release create "${{ steps.check.outputs.official_tag }}" \
            work/official/domico-${{ steps.check.outputs.vn }}-official.apks \
            --title "Domico ${{ steps.check.outputs.vn }}（Official mirror）" \
            --notes "Base Version: ${{ steps.check.outputs.vn }} (versionCode ${{ steps.check.outputs.vc }})" \
            --latest=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify patch still applies (dry-run, ビルド前検査)
        if: steps.check.outputs.new == 'true' || inputs.force
        run: |
          # probe/ の base APK を再利用してパッチ可否を検査する。
          # 失敗した場合、公式ミラーは前段で公開済みだがパッチ版 Release は作らない。
          set -o pipefail
          BASE=""
          for f in probe/*.apk; do
            if unzip -l "$f" | grep -qE 'classes[0-9]*\.dex'; then BASE="$f"; break; fi
          done
          if [ -z "$BASE" ]; then echo "::error::probe base apk (with dex) not found for dry-run"; exit 1; fi
          if ! python3 scripts/patch_apk.py --in "$BASE" --check 2>&1 | tee patch_check.log; then
            echo "::error::パッチ対象コードが変化しました(${{ steps.check.outputs.vn }})。" \
                 "patch_check.log の FAIL 行で該当クラスを確認し、smali を手動修正してください。" \
                 "パッチ未適用のため パッチ版 Release は作成しません。"
            exit 1
          fi
          echo "patch dry-run OK: 現行パッチは ${{ steps.check.outputs.vn }} に適用可能"

      - name: Restore keystore
        if: steps.check.outputs.new == 'true' || inputs.force
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > work_keystore.jks

      - name: Build patched APKs (dex-only patch)
        if: steps.check.outputs.new == 'true' || inputs.force
        run: |
          BT=$(ls -d $ANDROID_SDK_ROOT/build-tools/35.0.0)
          python3 scripts/build.py \
            --input download \
            --build-tools "$BT" \
            --keystore work_keystore.jks \
            --ks-pass "${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "${{ secrets.KEY_PASSWORD || secrets.KEYSTORE_PASSWORD }}" \
            --alias "${{ secrets.KEY_ALIAS }}" \
            --app-version "${{ steps.check.outputs.vn }}"

      - name: Publish Release (attach single .apks bundle)
        if: steps.check.outputs.new == 'true' || inputs.force
        run: |
          # gh release create は --clobber 非対応 & 既存タグだと失敗するため、
          # force 再実行に備えて既存 Release があれば削除してから作り直す(タグは残す)。
          gh release delete "${{ steps.check.outputs.tag }}" --yes 2>/dev/null || true
          # 本文は冒頭にbase versionを1行入れ、その後ろに --generate-notes で
          # 前回 Release 以降のマージ PR / コミットから自動生成した変更内容を付ける。
          # (--notes と --generate-notes 併用時、生成分は --notes の後ろに追記される)
          # (インストール方法やパッチ説明は README / docs に集約し、ここには載せない)
          gh release create "${{ steps.check.outputs.tag }}" \
            work/out/domico-${{ steps.check.outputs.vn }}-patch.apks \
            --title "Domico ${{ steps.check.outputs.vn }} Patched" \
            --notes "Base Version: ${{ steps.check.outputs.vn }} (versionCode ${{ steps.check.outputs.vc }})" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup secrets
        if: always()
        run: rm -f work_keystore.jks
