name: Patch Domico (auto)

# 公式 Domico の更新を検知し、APK を取得して B案パッチ・再署名し、
# Release として配布する。手動実行も可。
#
# 必要な GitHub Secrets:
#   KEYSTORE_BASE64  : 署名用 keystore を base64 化したもの
#                      (生成: scripts/gen-keystore.sh で作った .keystore を
#                       `base64 -w0 my.keystore` した文字列)
#   KEYSTORE_PASSWORD: keystore のパスワード (storepass)
#   KEY_PASSWORD     : 鍵のパスワード (keypass。storepass と同じなら省略可で KEYSTORE_PASSWORD を流用)
#   KEY_ALIAS        : 鍵のエイリアス
#
# 取得元(APKPure)が落ちている/構造変更した場合は失敗するので、
# その際は手動で input を渡して再実行できるよう workflow_dispatch を用意。

on:
  schedule:
    - cron: "0 0 * * *"   # 毎日 00:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "前回と同じバージョンでも強制的にパッチする"
        type: boolean
        default: false

permissions:
  contents: write   # Release 作成・タグ push のため

env:
  PACKAGE: jp.co.kyoritsu.domico
  APKTOOL_VERSION: "3.0.2"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (build-tools)
        uses: android-actions/setup-android@v3

      - name: Install build-tools 35.0.0
        run: sdkmanager "build-tools;35.0.0" "platform-tools"

      - name: Cache apktool
        id: cache-apktool
        uses: actions/cache@v4
        with:
          path: tools/apktool.jar
          key: apktool-${{ env.APKTOOL_VERSION }}

      - name: Download apktool
        if: steps.cache-apktool.outputs.cache-hit != 'true'
        run: |
          mkdir -p tools
          curl -L -o tools/apktool.jar \
            "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar"

      - name: Install apkeep (APK downloader)
        run: |
          curl -L -o apkeep "https://github.com/EFForg/apkeep/releases/latest/download/apkeep-x86_64-unknown-linux-gnu"
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/apkeep

      - name: Download latest Domico (APKPure / XAPK split)
        run: |
          mkdir -p download
          apkeep -a "${PACKAGE}" -d apk-pure download/
          echo "--- downloaded ---"
          ls -la download/

      - name: Detect version & compare with last patched
        id: ver
        run: |
          # apkeep は <pkg>.xapk または <pkg>.apk を出力
          INPUT=$(ls download/${PACKAGE}.xapk download/${PACKAGE}.apk 2>/dev/null | head -1)
          echo "input=$INPUT" >> "$GITHUB_OUTPUT"
          # versionCode を manifest.json(xapk) から取得（apkなら aapt で取得）
          if [[ "$INPUT" == *.xapk ]]; then
            VC=$(unzip -p "$INPUT" manifest.json | python3 -c "import sys,json;print(json.load(sys.stdin)['version_code'])")
            VN=$(unzip -p "$INPUT" manifest.json | python3 -c "import sys,json;print(json.load(sys.stdin)['version_name'])")
          else
            AAPT=$(ls $ANDROID_SDK_ROOT/build-tools/*/aapt2 | head -1)
            VC=$("$AAPT" dump badging "$INPUT" | sed -n "s/.*versionCode='\([0-9]*\)'.*/\1/p")
            VN=$("$AAPT" dump badging "$INPUT" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")
          fi
          echo "vc=$VC" >> "$GITHUB_OUTPUT"
          echo "vn=$VN" >> "$GITHUB_OUTPUT"
          echo "tag=v${VN}-patch" >> "$GITHUB_OUTPUT"
          echo "Detected versionCode=$VC versionName=$VN"
          # 既存 Release タグがあればスキップ判定
          if gh release view "v${VN}-patch" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore keystore
        if: steps.ver.outputs.exists == 'false' || inputs.force
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > work_keystore.jks

      - name: Build patched APKs
        if: steps.ver.outputs.exists == 'false' || inputs.force
        run: |
          BT=$(ls -d $ANDROID_SDK_ROOT/build-tools/35.0.0)
          python3 scripts/build.py \
            --input "${{ steps.ver.outputs.input }}" \
            --apktool tools/apktool.jar \
            --build-tools "$BT" \
            --keystore work_keystore.jks \
            --ks-pass "${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "${{ secrets.KEY_PASSWORD || secrets.KEYSTORE_PASSWORD }}" \
            --alias "${{ secrets.KEY_ALIAS }}"

      - name: Publish Release
        if: steps.ver.outputs.exists == 'false' || inputs.force
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            work/out/*.apk work/out/Domico-patched.apks \
            --title "Domico ${{ steps.ver.outputs.vn }} (patched: login-toast click-through)" \
            --notes "公式 ${{ steps.ver.outputs.vn }} (versionCode ${{ steps.ver.outputs.vc }}) に B案パッチ(起動時ログイン通知のタッチ遮断解除)を適用し再署名したものです。SAI で .apks を、または adb install-multiple で *.apk をインストールしてください。公式版とは署名が異なるため、初回は公式版のアンインストールが必要です。" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup secrets
        if: always()
        run: rm -f work_keystore.jks
