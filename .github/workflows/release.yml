name: Release patch version (CHANGELOG + tag)

# main への push を「パッチリリース」とみなし、Conventional Commits から
# パッチ自身のセムバーを算出して patch-vX.Y.Z タグ + CHANGELOG + GitHub Release を
# 自動生成する。バージョン番号の決定は scripts/version.py が SSOT。git-cliff は
# CHANGELOG 本文の整形のみ担当する。
#
# - リリース対象が無い(前回タグ以降に feat/fix 等が無い)場合は何もしない。
# - CHANGELOG コミットは [skip ci] 付き & GITHUB_TOKEN push なので再帰実行しない。
# - main がブランチ保護で bot push を拒否する場合は、保護設定で
#   github-actions による push を許可する必要がある。

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      attach_tag:
        description: "既存の patch-vX.Y.Z タグを指定すると、bump 判定を飛ばして、そのタグのコードで公式最新版にパッチを当てた APK をビルドし、そのリリースへ添付する(バックフィル用)。空欄なら通常動作。"
        type: string
        default: ""

permissions:
  contents: write

env:
  PACKAGE: jp.co.kyoritsu.domico
  BAKSMALI_URL: "https://github.com/baksmali/smali/releases/download/3.0.9/baksmali-3.0.9-fat-release.jar"
  SMALI_URL: "https://github.com/baksmali/smali/releases/download/3.0.9/smali-3.0.9-fat-release.jar"

jobs:
  release:
    runs-on: ubuntu-latest
    # build_apk ジョブが参照するため、版・bump 判定を job 出力に公開する。
    outputs:
      version: ${{ steps.ver.outputs.version }}
      bumped: ${{ steps.ver.outputs.bumped }}
      exists: ${{ steps.ver.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next patch version
        id: ver
        run: |
          OUT=$(python3 scripts/version.py --number-only --print-bumped)
          VER=$(printf '%s\n' "$OUT" | sed -n 1p)
          BUMPED=$(printf '%s\n' "$OUT" | sed -n 2p)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"
          if git rev-parse "patch-v$VER" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "next=patch-v$VER bumped=$BUMPED"
          if [ "$BUMPED" != "1" ]; then
            echo "::notice::前回タグ以降にリリース対象コミット(feat/fix 等)が無いためスキップ"
          fi

      - name: Generate CHANGELOG
        if: steps.ver.outputs.bumped == '1' && steps.ver.outputs.exists == 'false'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag patch-v${{ steps.ver.outputs.version }} --output CHANGELOG.md

      - name: Commit, tag, push
        if: steps.ver.outputs.bumped == '1' && steps.ver.outputs.exists == 'false'
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): patch-v$VER [skip ci]" || echo "CHANGELOG 変更なし"
          git tag -a "patch-v$VER" -m "domico-patch v$VER"
          git push origin HEAD:main
          git push origin "patch-v$VER"

      - name: Create GitHub Release
        if: steps.ver.outputs.bumped == '1' && steps.ver.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          # CHANGELOG 先頭の当該バージョン節だけ抜き出してリリースノートにする。
          awk '/^## \[/{c++} c==1{print} c==2{exit}' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            gh release create "patch-v$VER" --title "Domico Patch v$VER" --generate-notes
          else
            gh release create "patch-v$VER" --title "Domico Patch v$VER" --notes-file RELEASE_NOTES.md
          fi

  # パッチ版が上がったとき、公式最新版にパッチを当てた APK をビルドして
  # patch-vX.Y.Z リリースへ添付する。ビルド手順は patch.yml の build と同等
  # (公式版基準の v{vn}-patch とは別軸: ここはパッチ版基準の成果物)。
  build_apk:
    needs: release
    # 通常: bump で新リリースを作ったとき。手動: attach_tag 指定でバックフィル。
    # attach_tag の判定は workflow_dispatch のときだけ行う(push では inputs が
    # 空のため、event 種別で短絡して push 時の誤発火を防ぐ)。
    if: >-
      (needs.release.outputs.bumped == '1' && needs.release.outputs.exists == 'false')
      || (github.event_name == 'workflow_dispatch' && inputs.attach_tag != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # attach_tag 指定時はそのタグのコードでビルド(当時のパッチ挙動を忠実に再現)。
          # 通常時は main(release ジョブが push 済みの patch-vX.Y.Z タグを含む)。
          ref: ${{ inputs.attach_tag || 'main' }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve target tag/version
        id: target
        run: |
          if [ -n "${{ inputs.attach_tag }}" ]; then
            TAG="${{ inputs.attach_tag }}"
          else
            TAG="patch-v${{ needs.release.outputs.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#patch-v}" >> "$GITHUB_OUTPUT"
          echo "target release=$TAG (patch version ${TAG#patch-v})"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (build-tools)
        uses: android-actions/setup-android@v3

      - name: Install build-tools 35.0.0
        run: sdkmanager "build-tools;35.0.0" "platform-tools"

      - name: Cache smali/baksmali
        id: cache-smali
        uses: actions/cache@v4
        with:
          path: |
            tools/baksmali.jar
            tools/smali.jar
          key: smali-3.0.9

      - name: Download smali/baksmali
        if: steps.cache-smali.outputs.cache-hit != 'true'
        run: |
          mkdir -p tools
          curl -L -o tools/baksmali.jar "$BAKSMALI_URL"
          curl -L -o tools/smali.jar "$SMALI_URL"

      - name: Install apkeep (APK downloader)
        run: |
          curl -L -o apkeep "https://github.com/EFForg/apkeep/releases/latest/download/apkeep-x86_64-unknown-linux-gnu"
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/apkeep

      - name: Probe latest official version (Play, base APK のみ)
        id: probe
        run: |
          rm -rf probe && mkdir -p probe
          apkeep -a "${PACKAGE}" -d google-play \
            -e "${{ secrets.GOOGLE_EMAIL }}" -t "${{ secrets.GOOGLE_AAS_TOKEN }}" \
            --accept-tos probe/
          find probe -mindepth 2 -name '*.apk' -exec mv -t probe/ {} + 2>/dev/null || true
          AAPT=$(ls $ANDROID_SDK_ROOT/build-tools/*/aapt2 | head -1)
          BASE=""
          for f in probe/*.apk; do
            if unzip -l "$f" | grep -qE 'classes[0-9]*\.dex'; then BASE="$f"; break; fi
          done
          if [ -z "$BASE" ]; then echo "::error::probe base apk (with dex) not found"; exit 1; fi
          BADGING=$("$AAPT" dump badging "$BASE")
          VN=$(echo "$BADGING" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")
          VC=$(echo "$BADGING" | sed -n "s/.*versionCode='\([0-9]*\)'.*/\1/p")
          echo "vn=$VN" >> "$GITHUB_OUTPUT"
          echo "vc=$VC" >> "$GITHUB_OUTPUT"
          echo "Probed official versionName=$VN versionCode=$VC"

      - name: Download splits (Google Play, 日本語含む)
        run: |
          rm -rf download && mkdir -p download
          apkeep -a "${PACKAGE}" -d google-play \
            -e "${{ secrets.GOOGLE_EMAIL }}" -t "${{ secrets.GOOGLE_AAS_TOKEN }}" \
            --accept-tos -o "split_apk=1,locale=ja_JP" \
            download/
          find download -mindepth 2 -name '*.apk' -exec mv -t download/ {} + 2>/dev/null || true
          echo "--- downloaded ---"; ls -la download/

      - name: Verify patch still applies (dry-run)
        run: |
          set -o pipefail
          BASE=""
          for f in probe/*.apk; do
            if unzip -l "$f" | grep -qE 'classes[0-9]*\.dex'; then BASE="$f"; break; fi
          done
          if [ -z "$BASE" ]; then echo "::error::probe base apk (with dex) not found for dry-run"; exit 1; fi
          if ! python3 scripts/patch_apk.py --in "$BASE" --check 2>&1 | tee patch_check.log; then
            echo "::error::パッチ対象コードが現行公式版(${{ steps.probe.outputs.vn }})に適用できません。" \
                 "patch_check.log の FAIL 行を確認し smali を修正してください。APK は添付しません。"
            exit 1
          fi

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > work_keystore.jks

      - name: Build patched APKs (dex-only patch)
        run: |
          BT=$(ls -d $ANDROID_SDK_ROOT/build-tools/35.0.0)
          # 設定画面に埋め込むパッチ版は対象タグから明示指定する(version.py の
          # release チャンネル表記と同形式: "vX.Y.Z / base <公式版>")。
          python3 scripts/build.py \
            --input download \
            --build-tools "$BT" \
            --keystore work_keystore.jks \
            --ks-pass "${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "${{ secrets.KEY_PASSWORD || secrets.KEYSTORE_PASSWORD }}" \
            --alias "${{ secrets.KEY_ALIAS }}" \
            --app-version "${{ steps.probe.outputs.vn }}" \
            --patch-version "v${{ steps.target.outputs.ver }} / base ${{ steps.probe.outputs.vn }}"

      - name: Attach .apks to patch-v release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.target.outputs.tag }}
          VER: ${{ steps.target.outputs.ver }}
          VN: ${{ steps.probe.outputs.vn }}
        run: |
          # 再実行に備え --clobber で同名アセットを上書きする。アセット名には
          # パッチ版と公式ベース版の両方を含め、どの組合せか分かるようにする。
          OUT="domico-v${VER}-base${VN}-patch.apks"
          cp "work/out/domico-${VN}-patch.apks" "$OUT"
          gh release upload "$TAG" "$OUT" --clobber
          echo "attached $OUT to $TAG"

      - name: Cleanup secrets
        if: always()
        run: rm -f work_keystore.jks
